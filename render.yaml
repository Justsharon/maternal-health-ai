services:
  - type: web
    name: sentinel-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python3 -m build.precompute_embeddings && python3 -m build.precompute_fairness
    startCommand: PYTHONPATH=. uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_MOCK_LLM
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
